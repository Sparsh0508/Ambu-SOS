apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapbulance-frontend
spec:
  replicas: 2 # High availability for the UI too!
  selector:
    matchLabels:
      app: snapbulance-frontend
  template:
    metadata:
      labels:
        app: snapbulance-frontend
    spec:
      containers:
        - name: frontend
          image: snapbulance-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80 # Assuming your Nginx/Vite container uses port 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: snapbulance-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP