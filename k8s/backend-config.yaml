apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  NODE_ENV: "production"
  REACT_PROD_URL: "http://frontend-service"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
type: Opaque
stringData:
  MONGODB_URI: "mongodb://mongodb-service:27017/snapbulance"
  JWT_SECRET: "your_ultra_secure_production_key"
